<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Delivery Verification</title>
  <style>
:root {
  color-scheme: light;
  --bg1: #fff1f6;
  --bg2: #f4e9ff;
  --card: rgba(255,255,255,.95);
  --text: #241a25;
  --muted: #766875;
  --accent: #e84a8a;
  --soft: #f4edf2;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100svh;
  display: grid;
  place-items: center;
  padding: 20px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  background: linear-gradient(145deg, var(--bg1), var(--bg2));
  color: var(--text);
}
.card {
  width: min(100%, 440px);
  padding: 30px 24px;
  border-radius: 24px;
  background: var(--card);
  box-shadow: 0 18px 55px rgba(91,45,80,.16);
  text-align: center;
}
.status {
  display: inline-flex;
  padding: 8px 12px;
  border-radius: 999px;
  background: var(--soft);
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
}
h1 {
  margin: 22px 0 10px;
  font-size: clamp(27px, 7vw, 38px);
  line-height: 1.08;
}
p {
  margin: 0;
  color: var(--muted);
  font-size: 16px;
  line-height: 1.55;
}
.question {
  margin-top: 28px;
  font-size: 23px;
  font-weight: 800;
}
.progress {
  margin-top: 18px;
  color: var(--muted);
  font-size: 14px;
  font-weight: 700;
}
.challenge-image {
  width: 100%;
  max-height: 330px;
  object-fit: contain;
  margin-top: 18px;
  border-radius: 18px;
  background: var(--soft);
  border: 2px solid #eadde5;
}
.answer-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  margin-top: 18px;
}
input[type="number"] {
  width: 100%;
  min-height: 54px;
  border: 2px solid #eadde5;
  border-radius: 16px;
  padding: 0 16px;
  font-size: 19px;
  color: var(--text);
  background: white;
  outline: none;
}
input[type="number"]:focus { border-color: var(--accent); }
.buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 20px;
}
.button {
  min-height: 54px;
  display: grid;
  place-items: center;
  padding: 12px 16px;
  border: 0;
  border-radius: 16px;
  text-decoration: none;
  font-size: 17px;
  font-weight: 800;
  cursor: pointer;
  touch-action: manipulation;
}
.button:active { transform: scale(.97); }
.primary {
  background: var(--accent);
  color: white;
  box-shadow: 0 9px 22px rgba(232,74,138,.28);
}
.secondary {
  background: var(--soft);
  color: var(--text);
}
.hidden { display: none !important; }
.feedback {
  min-height: 24px;
  margin-top: 12px;
  font-size: 14px;
  font-weight: 800;
  color: #a12651;
}
.loading { opacity: .65; pointer-events: none; }
.result {
  margin-top: 24px;
  padding: 20px;
  border-radius: 18px;
  font-size: 24px;
  font-weight: 900;
}
.success {
  background: #ffe1ed;
  color: #b52361;
}
.fail {
  background: #f0eef0;
  color: #5e555d;
}
.back {
  margin-top: 18px;
  width: 100%;
}
</style>
</head>
<body>
  <main class="card">
    <div class="status">🔒 CAPTCHA VERIFICATION</div>
    <h1>Complete this captcha to deliver the message</h1>
    <p>Please complete the verification steps below.</p>

    <section id="math-step">
      <div class="progress" id="math-progress">Math question 1 of 3</div>
      <div class="question" id="math-question"></div>

      <form id="math-form">
        <div class="answer-row">
          <input
            id="math-answer"
            type="number"
            inputmode="numeric"
            autocomplete="off"
            placeholder="Your answer"
            required
          >
          <button class="button primary" type="submit">Check</button>
        </div>
      </form>

      <div class="feedback" id="math-feedback"></div>
    </section>

    <section id="human-step" class="hidden">
      <div class="question">Are you a human?</div>
      <div class="buttons">
        <button class="button primary" type="button" data-human="yes">Yes</button>
        <button class="button secondary" type="button" data-human="no">No</button>
      </div>
    </section>

    <section id="equipment-step" class="hidden">
      <div class="question">How many unnecessary equipments are present in this picture?</div>
      <img
        class="challenge-image"
        src="Untitled.jpeg"
        alt="Equipment challenge"
        onerror="this.alt='Upload Untitled.jpeg to the repository root';"
      >

      <form id="equipment-form">
        <div class="answer-row">
          <input
            id="equipment-answer"
            type="number"
            inputmode="numeric"
            autocomplete="off"
            placeholder="Your answer"
            required
          >
          <button class="button primary" type="submit">Check</button>
        </div>
      </form>

      <div class="feedback" id="equipment-feedback"></div>
    </section>

    <section id="cute-step" class="hidden">
      <div class="question">Are you cute?</div>

      <form id="captcha-form">
        <input type="hidden" name="math_score" value="3/3">
        <input id="human-answer-hidden" type="hidden" name="human_answer" value="">
        <input id="equipment-answer-hidden" type="hidden" name="equipment_answer" value="3">
        <input id="cute-answer-hidden" type="hidden" name="cute_answer" value="">
        <input type="hidden" name="subject" value="Cute captcha answer">

        <div class="buttons">
          <button class="button primary" type="submit" data-cute="yes">Yes</button>
          <button class="button secondary" type="submit" data-cute="no">No</button>
        </div>
      </form>
    </section>

    <div class="feedback" data-fs-error></div>
  </main>

  <script>
    const questions = [
      { text: "7 + 5 = ?", answer: 12 },
      { text: "14 − 6 = ?", answer: 8 },
      { text: "4 × 3 = ?", answer: 12 }
    ];

    let mathIndex = 0;
    let selectedHumanAnswer = "";
    let selectedCuteAnswer = "";

    const mathQuestion = document.getElementById("math-question");
    const mathProgress = document.getElementById("math-progress");
    const mathAnswer = document.getElementById("math-answer");
    const mathFeedback = document.getElementById("math-feedback");

    function showMathQuestion() {
      mathQuestion.textContent = questions[mathIndex].text;
      mathProgress.textContent = `Math question ${mathIndex + 1} of ${questions.length}`;
      mathAnswer.value = "";
      mathAnswer.focus();
    }

    document.getElementById("math-form").addEventListener("submit", (event) => {
      event.preventDefault();

      if (Number(mathAnswer.value) !== questions[mathIndex].answer) {
        mathFeedback.textContent = "Incorrect. Try again.";
        return;
      }

      mathFeedback.textContent = "";
      mathIndex += 1;

      if (mathIndex < questions.length) {
        showMathQuestion();
      } else {
        document.getElementById("math-step").classList.add("hidden");
        document.getElementById("human-step").classList.remove("hidden");
      }
    });

    document.querySelectorAll("[data-human]").forEach((button) => {
      button.addEventListener("click", () => {
        selectedHumanAnswer = button.dataset.human;
        document.getElementById("human-answer-hidden").value = selectedHumanAnswer;
        document.getElementById("human-step").classList.add("hidden");
        document.getElementById("equipment-step").classList.remove("hidden");
      });
    });

    document.getElementById("equipment-form").addEventListener("submit", (event) => {
      event.preventDefault();

      const value = Number(document.getElementById("equipment-answer").value);
      const feedback = document.getElementById("equipment-feedback");

      if (value !== 3) {
        feedback.textContent = "Incorrect. Try again.";
        return;
      }

      feedback.textContent = "";
      document.getElementById("equipment-answer-hidden").value = String(value);
      document.getElementById("equipment-step").classList.add("hidden");
      document.getElementById("cute-step").classList.remove("hidden");
    });

    document.querySelectorAll("[data-cute]").forEach((button) => {
      button.addEventListener("click", () => {
        selectedCuteAnswer = button.dataset.cute;
        document.getElementById("cute-answer-hidden").value = selectedCuteAnswer;
      });
    });

    window.formspree =
      window.formspree ||
      function () {
        (formspree.q = formspree.q || []).push(arguments);
      };

    formspree("initForm", {
      formElement: "#captcha-form",
      formId: "mdaqzlqg",

      disable: ({ form }) => form.classList.add("loading"),
      enable: ({ form }) => form.classList.remove("loading"),

      onSuccess: () => {
        const resultUrl = new URL("result.html", window.location.href);
        resultUrl.searchParams.set("answer", selectedCuteAnswer);
        window.location.href = resultUrl.toString();
      }
    });

    showMathQuestion();
  </script>

  <script src="https://unpkg.com/@formspree/ajax@1" defer></script>
</body>
</html>
