<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delivery Result</title>
  <style>
:root {
  color-scheme: light;
  --bg1: #fff1f6;
  --bg2: #f4e9ff;
  --card: rgba(255,255,255,.95);
  --text: #241a25;
  --muted: #766875;
  --accent: #e84a8a;
  --accent-dark: #c93271;
  --soft: #f4edf2;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100svh;
  display: grid;
  place-items: center;
  padding: 20px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  background: linear-gradient(145deg, var(--bg1), var(--bg2));
  color: var(--text);
}
.card {
  width: min(100%, 430px);
  padding: 30px 24px;
  border-radius: 24px;
  background: var(--card);
  box-shadow: 0 18px 55px rgba(91,45,80,.16);
  text-align: center;
}
.status {
  display: inline-flex;
  padding: 8px 12px;
  border-radius: 999px;
  background: var(--soft);
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
}
h1 {
  margin: 22px 0 10px;
  font-size: clamp(27px, 7vw, 38px);
  line-height: 1.08;
}
p {
  margin: 0;
  color: var(--muted);
  font-size: 16px;
  line-height: 1.55;
}
.question {
  margin-top: 28px;
  font-size: 23px;
  font-weight: 800;
}
.progress {
  margin-top: 18px;
  color: var(--muted);
  font-size: 14px;
  font-weight: 700;
}
.math-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  margin-top: 18px;
}
input[type="number"] {
  width: 100%;
  min-height: 54px;
  border: 2px solid #eadde5;
  border-radius: 16px;
  padding: 0 16px;
  font-size: 19px;
  color: var(--text);
  background: white;
  outline: none;
}
input[type="number"]:focus {
  border-color: var(--accent);
}
.buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 20px;
}
.button {
  min-height: 54px;
  display: grid;
  place-items: center;
  padding: 12px 16px;
  border: 0;
  border-radius: 16px;
  text-decoration: none;
  font-size: 17px;
  font-weight: 800;
  cursor: pointer;
  touch-action: manipulation;
}
.button:active { transform: scale(.97); }
.primary {
  background: var(--accent);
  color: white;
  box-shadow: 0 9px 22px rgba(232,74,138,.28);
}
.secondary {
  background: var(--soft);
  color: var(--text);
}
.hidden { display: none !important; }
.feedback {
  min-height: 24px;
  margin-top: 12px;
  font-size: 14px;
  font-weight: 800;
  color: #a12651;
}
.loading { opacity: .65; pointer-events: none; }
.result {
  margin-top: 24px;
  padding: 20px;
  border-radius: 18px;
  font-size: 24px;
  font-weight: 900;
}
.success {
  background: #ffe1ed;
  color: #b52361;
}
.fail {
  background: #f0eef0;
  color: #5e555d;
}
.back {
  margin-top: 18px;
  width: 100%;
}
</style>
</head>
<body>
  <main class="card">
    <div class="status">MESSAGE STATUS</div>
    <div id="result" class="result"></div>
    <a class="button secondary back" href="index.html">Go back</a>
  </main>

  <script>
    const answer = new URLSearchParams(window.location.search).get("answer");
    const result = document.getElementById("result");

    if (answer === "yes") {
      result.className = "result success";
      result.textContent = "Your ego must be very big. Message delivered successfully.";
    } else {
      result.className = "result fail";
      result.textContent = "Delivery failed.";
    }
  </script>
</body>
</html>
